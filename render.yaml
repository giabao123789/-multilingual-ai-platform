services:
  - name: multilingual-ai-platform-api
    type: web
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
  - name: multilingual-ai-platform-web
    type: web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /robots.txt
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DEFAULT_LOCALE
        value: vi
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
